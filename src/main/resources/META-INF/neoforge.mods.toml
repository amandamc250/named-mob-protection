[[mods]]
    modId="namedmobprotection"
    version="1.0.0"
    displayName="Named Mob Protection"
    description='''
        Any mob with a name tag (any name at all) cannot take damage or be killed.
        Works against players, other mobs, lava, fall damage, and everything else.
        Simply give a mob a name tag to protect it. Remove the name to unprotect it.
    '''

