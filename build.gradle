plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = mod_version
group = 'com.amanda.namedmobprotection'

base {
    archivesName = 'namedmobprotection'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = neoforge_version

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        namedmobprotection {
            sourceSet sourceSets.main
        }
    }
}

// Ensure the jar manifest has the correct mod info
jar {
    manifest {
        attributes([
            'Specification-Title'     : 'namedmobprotection',
            'Specification-Vendor'    : 'amanda',
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion,
            'Implementation-Vendor'   : 'amanda',
        ])
    }
}
