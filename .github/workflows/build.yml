name: Build Named Mob Protection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
          cache-disabled: true

      - name: Build mod
        run: gradle build --no-build-cache

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: namedmobprotection-1.0.0
          path: build/libs/namedmobprotection-1.0.0.jar
